stages:
  - verify
  - test
  - audit

default:
  image: python:3.12-slim
  before_script:
    - python -m pip install --upgrade pip
    - python -m pip install uv
    - uv sync --dev

compile:
  stage: verify
  script:
    - uv run python -m compileall app.py pages components services src/neuronote tests/test_backend_api.py tests/test_database.py tests/test_e2e_backend.py scripts

ruff:
  stage: verify
  script:
    - uv run ruff check app.py pages components services src/neuronote tests/test_backend_api.py tests/test_database.py tests/test_e2e_backend.py scripts

mypy:
  stage: verify
  script:
    - uv run mypy

unit_tests:
  stage: test
  script:
    - uv run pytest

streamlit_smoke:
  stage: test
  script:
    - uv run python scripts/local_audit.py streamlit-pages

offline_pdf_pipeline:
  stage: test
  script:
    - uv run python scripts/local_audit.py offline-pdf

sqlite_schema:
  stage: audit
  script:
    - uv run python scripts/local_audit.py sqlite-schema

no_cloud_ai:
  stage: audit
  script:
    - uv run python scripts/local_audit.py no-cloud-ai

repo_metadata:
  stage: audit
  script:
    - uv run python scripts/local_audit.py required-files
    - uv run python scripts/local_audit.py license
    - uv run python scripts/local_audit.py gitignore
    - uv run python scripts/local_audit.py docs-commands

security_scan:
  stage: audit
  script:
    - uv run bandit -q -r app.py pages components services src/neuronote scripts

dependency_audit:
  stage: audit
  script:
    - uv export --dev --format requirements-txt --no-hashes -o audit-requirements.txt
    - uv run pip-audit -r audit-requirements.txt
