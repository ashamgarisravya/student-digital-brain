repos:
  - repo: local
    hooks:
      - id: compile
        name: Python compile check
        entry: uv run python -m compileall app.py pages components services src tests scripts
        language: system
        pass_filenames: false
      - id: ruff
        name: Ruff lint
        entry: uv run ruff check app.py pages components services src tests scripts
        language: system
        pass_filenames: false
      - id: mypy
        name: Mypy type check
        entry: uv run mypy
        language: system
        pass_filenames: false
      - id: tests
        name: Pytest suite
        entry: uv run pytest
        language: system
        pass_filenames: false
      - id: no-cloud-ai
        name: No cloud AI API scan
        entry: uv run python scripts/local_audit.py no-cloud-ai
        language: system
        pass_filenames: false
